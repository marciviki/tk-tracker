<!DOCTYPE html>

<head>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
      background: #0a0a0a; color: #e5e5e5;
    }
    .card {
      text-align: center; padding: 48px 64px;
      border: 1px solid #2a2a2a; border-radius: 16px; background: #111;

    h1 { font-size: 24px; font-weight: 600; margin-bottom: 12px; }
    p { color: #888; font-size: 14px; line-height: 1.6; }
    .tag {
      display: inline-block; margin-top: 24px; padding: 6px 16px;
      border-radius: 999px; background: #1a1a1a;
      border: 1px solid #333; font-size: 12px; color: #666;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>投资研究助手</h1>
    <p>个人投资内容追踪与分析平台<br>Powered by AI</p>
    <div class="tag">Portfolio Tracker</div>
  </div>
</body>
</html>
